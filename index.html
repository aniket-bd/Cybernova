<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Irrigation Dashboard</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f4f7fb;
}

header{
background:#2e7d32;
color:white;
padding:15px;
text-align:center;
font-size:24px;
}

.container{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
text-align:center;
}

.card h3{
margin-bottom:10px;
}

.value{
font-size:28px;
font-weight:bold;
color:#2e7d32;
}

.controls{
margin-top:30px;
text-align:center;
}

button{
padding:12px 25px;
font-size:16px;
border:none;
border-radius:6px;
margin:10px;
cursor:pointer;
}

.on{
background:#4caf50;
color:white;
}

.off{
background:#e53935;
color:white;
}

footer{
text-align:center;
padding:10px;
margin-top:30px;
background:#ddd;
}

</style>
</head>

<body>

<header>
🌱 Smart Irrigation System Dashboard
</header>

<div class="container">

<div class="card">
<h3>Soil Moisture</h3>
<div class="value" id="moisture">45%</div>
</div>

<div class="card">
<h3>Temperature</h3>
<div class="value" id="temp">28°C</div>
</div>

<div class="card">
<h3>Humidity</h3>
<div class="value" id="humidity">60%</div>
</div>

<div class="card">
<h3>pH Level</h3>
<div class="value" id="ph">6.8</div>
</div>

<div class="card">
<h3>Water Used Today</h3>
<div class="value" id="water">1200 L</div>
</div>

<div class="card">
<h3>Motor Status</h3>
<div class="value" id="motor">OFF</div>
</div>

</div>

<div class="controls">

<h2>Motor Control</h2>

<button class="on" onclick="motorOn()">Turn ON Pump</button>
<button class="off" onclick="motorOff()">Turn OFF Pump</button>

</div>

<footer>
Smart Irrigation Hackathon Project
</footer>

<script>

function motorOn(){
document.getElementById("motor").innerText="ON";
}

function motorOff(){
document.getElementById("motor").innerText="OFF";
}

/* Fake sensor simulation */
setInterval(()=>{

document.getElementById("moisture").innerText=
Math.floor(Math.random()*40+40)+"%";

document.getElementById("temp").innerText=
Math.floor(Math.random()*10+25)+"°C";

document.getElementById("humidity").innerText=
Math.floor(Math.random()*30+50)+"%";

},3000);

</script>

</body>
</html>
